name: Glacier monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_USER_ID: ${{ secrets.LINE_TO_USER_ID }}
          TARGET_DATES: |
            08-08-2026
            08-09-2026
            08-10-2026
            08-11-2026
            08-12-2026
            08-18-2026
          TARGET_HOTELS: |
            Many Glacier Hotel
            Lake McDonald
            Village Inn at Apgar
          STATE_FILE: .github/state/glacier_monitor_line_state.json
          ENABLE_SCREENSHOTS: "false"
        run: python glacier_lodge_monitor_github_actions.py

      - name: Commit updated state
        run: |
          if git diff --quiet -- .github/state/glacier_monitor_line_state.json; then
            echo "No state changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/glacier_monitor_line_state.json
          git commit -m "Update glacier monitor state"
          git push
